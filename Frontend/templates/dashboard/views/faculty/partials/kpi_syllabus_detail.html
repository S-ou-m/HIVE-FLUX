<div class="modal-backdrop" onclick="closeModal()">
    <div class="modal-content animate-slide-up" onclick="event.stopPropagation();" style="max-width: 700px;">
        <div class="modal-header border-b border-white/10 pb-4 mb-6">
            <div>
                <h3 class="text-xl font-black text-white uppercase tracking-tight flex items-center gap-2">
                    <i class="fas fa-book-open text-green-500"></i> Syllabus Completion Map
                </h3>
                <p class="text-[10px] font-bold text-muted uppercase tracking-widest mt-1">Institutional academic progression tracking</p>
            </div>
            <button class="close-btn text-2xl opacity-50 hover:opacity-100 transition-opacity" onclick="closeModal()">&times;</button>
        </div>

        <div class="modal-body space-y-8">
            {% for item in syllabus_data %}
            <div class="space-y-3">
                <div class="flex justify-between items-end">
                    <div>
                        <h4 class="text-sm font-black text-white">{{ item.subject.name }}</h4>
                        <p class="text-[10px] text-muted font-bold">{{ item.subject.code }} • {{ item.count }} Sessions Delivered</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-black {% if item.status == 'On Track' %}text-green-500{% else %}text-red-500{% endif %} uppercase tracking-widest px-2 py-1 bg-white/5 rounded border border-white/10">
                            {{ item.status }}
                        </span>
                        <div class="text-lg font-black text-white mt-1">{{ item.progress }}%</div>
                    </div>
                </div>
                <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden">
                    <div class="h-full {% if item.status == 'On Track' %}bg-green-500 shadow-[0_0_10px_#10b981]{% else %}bg-orange-500 shadow-[0_0_10px_#f59e0b]{% endif %} transition-all duration-1000" style="width: {{ item.progress }}%"></div>
                </div>
            </div>
            {% empty %}
            <div class="p-12 text-center border border-dashed border-white/10 rounded-2xl">
                <i class="fas fa-layer-group text-3xl opacity-20 mb-4 block"></i>
                <p class="text-xs font-bold text-muted uppercase tracking-widest">No syllabus data mapping found</p>
            </div>
            {% endfor %}
        </div>

        <div class="modal-footer border-t border-white/10 pt-4 mt-6">
            <button class="btn-primary-glow" onclick="closeModal()">Close Academic Map</button>
        </div>
    </div>
</div>
