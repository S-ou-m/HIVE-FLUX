<div class="glass-panel p-5 animate-[feed-scroll_0.3s_ease-out]">
    <div class="text-[10px] text-muted font-black uppercase tracking-widest mb-4 flex items-center justify-between">
        <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444] animate-pulse"></div> Live Activity Panel</div>
        <div class="text-blue-400 opacity-50"><i class="fas fa-satellite-dish animate-pulse"></i></div>
    </div>
    
    <div class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-2 scrollbar-hide">
        {% for feed in hub.activity_feed %}
        <div class="bg-white/5 border border-white/10 p-2.5 rounded-lg flex justify-between items-center hover:bg-white/10 transition-colors cursor-default">
            <div class="text-xs font-bold text-white">{{ feed.user }}</div>
            {% if feed.type == 'success' %}
                <div class="text-[9px] font-black tracking-widest text-green-500 uppercase px-1.5 py-0.5 bg-green-500/10 rounded border border-green-500/20"><i class="fas fa-check"></i> {{ feed.status }}</div>
            {% elif feed.type == 'danger' %}
                <div class="text-[9px] font-black tracking-widest text-red-500 uppercase px-1.5 py-0.5 bg-red-500/10 rounded border border-red-500/20"><i class="fas fa-times"></i> {{ feed.status }}</div>
            {% else %}
                <div class="text-[9px] font-black tracking-widest text-orange-500 uppercase px-1.5 py-0.5 bg-orange-500/10 rounded border border-orange-500/20"><i class="fas fa-exclamation"></i> {{ feed.status }}</div>
            {% endif %}
        </div>
        {% empty %}
        <div class="text-xs text-muted font-bold text-center p-4">Waiting for incoming telemetry...</div>
        {% endfor %}
    </div>
</div>
