<div class="animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-2xl font-black text-white tracking-tighter">Risk Signal Intelligence</h2>
            <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest mt-1">Cross-Subject Decay Detection</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center text-red-400">
            <i class="fa-solid fa-bolt-lightning text-xs animate-pulse"></i>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-6">
        {% for signal in signals %}
        <div class="p-8 bg-white/5 border border-white/10 rounded-[32px] space-y-6 hover:border-red-500/30 transition-all group">
            <div class="flex justify-between items-start">
                <div class="px-3 py-1 bg-red-500/10 border border-red-500/20 rounded-lg text-[9px] font-black text-red-400 uppercase tracking-widest">
                    {{ signal.priority }} Priority
                </div>
                <div class="text-[10px] font-black text-white/20 uppercase tracking-widest">{{ signal.type }} Signal</div>
            </div>
            
            <div>
                <h3 class="text-xl font-black text-white group-hover:text-red-400 transition-colors">{{ signal.subject }}</h3>
                <p class="text-[11px] text-white/40 leading-relaxed mt-2 uppercase font-bold tracking-widest">Detected Decay: {{ signal.decay }}</p>
            </div>

            <div class="pt-6 border-t border-white/5 flex gap-3">
                <button hx-get="{% url 'student_support_hub_partial' %}"
                        hx-target="#workspace-core"
                        class="flex-1 py-3 bg-white/5 hover:bg-white/10 border border-white/10 text-white text-[9px] font-black rounded-xl uppercase tracking-widest transition-all">
                    Orchestrate Support
                </button>
                <button class="w-12 py-3 bg-red-500/10 border border-red-500/20 text-red-400 text-[9px] font-black rounded-xl flex items-center justify-center hover:bg-red-500/20 transition-all">
                    <i class="fa-solid fa-shield-halved"></i>
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
