<div class="animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-2xl font-black text-white tracking-tighter">Operational Timeline</h2>
            <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest mt-1">Today's Academic Execution Plan</p>
        </div>
        <div class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-[10px] font-black text-white/40 uppercase tracking-widest">
            {{ sessions|length }} Sessions Scheduled
        </div>
    </div>

    <div class="space-y-4">
        {% for session in sessions %}
        <div class="p-6 bg-white/5 border border-white/10 rounded-3xl flex items-center justify-between group hover:border-blue-500/30 transition-all">
            <div class="flex items-center gap-6">
                <div class="text-sm font-black text-white/40 group-hover:text-blue-400 transition-colors">{{ session.time }}</div>
                <div>
                    <div class="text-sm font-black text-white">{{ session.subject }}</div>
                    <div class="text-[10px] font-bold text-white/30 uppercase tracking-widest">{{ session.location }}</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span class="px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest 
                    {% if session.status == 'COMPLETED' %}bg-emerald-500/10 text-emerald-400 border border-emerald-500/20
                    {% elif session.status == 'IN_PROGRESS' %}bg-blue-500/10 text-blue-400 border border-blue-500/20 animate-pulse
                    {% else %}bg-white/5 text-white/40 border border-white/10{% endif %}">
                    {{ session.status }}
                </span>
                <button class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white/20 hover:text-white transition-all">
                    <i class="fa-solid fa-chevron-right text-[10px]"></i>
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
