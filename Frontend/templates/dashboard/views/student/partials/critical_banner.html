<div class="px-6 py-3 bg-red-500/10 border-b border-red-500/20 flex items-center justify-between animate-slide-down">
    <div class="flex items-center gap-4">
        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_#ef4444]"></div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">CRITICAL NOTICE:</span>
            <span class="text-[11px] font-bold text-white/90">{{ signal.description }}</span>
        </div>
    </div>
    
    <div class="flex items-center gap-6">
        <button class="text-[9px] font-black text-white/40 uppercase tracking-widest hover:text-white transition-colors"
                hx-get="{% url 'student_support_hub_partial' %}"
                hx-target="#workspace-core">
            TAKE ACTION <i class="fas fa-arrow-right ml-1.5"></i>
        </button>
        <button class="text-white/20 hover:text-white transition-colors"
                onclick="this.closest('.animate-slide-down').remove()">
            <i class="fas fa-times"></i>
        </button>
    </div>
</div>
