<div class="p-8 bg-white/[0.03] border border-white/5 rounded-[40px] animate-in slide-in-from-top-4 duration-700">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h3 class="text-lg font-black text-white">{{ goal.title }}</h3>
            <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mt-1">{{ goal.get_goal_type_display }} Intelligence</p>
        </div>
        <button class="text-[10px] font-black text-white/20 uppercase hover:text-white" onclick="this.closest('#goal-configuration-surface').innerHTML = ''">Close Audit</button>
    </div>
    
    <div class="grid grid-cols-3 gap-6 mb-10">
        <div class="p-4 bg-white/5 border border-white/10 rounded-2xl">
            <div class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-1">Current State</div>
            <div class="text-xl font-black text-white">{{ goal.current_value }}</div>
        </div>
        <div class="p-4 bg-white/5 border border-white/10 rounded-2xl">
            <div class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-1">Institutional Target</div>
            <div class="text-xl font-black text-white">{{ goal.target_value }}</div>
        </div>
        <div class="p-4 bg-white/5 border border-white/10 rounded-2xl">
            <div class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-1">Progression</div>
            <div class="text-xl font-black text-emerald-400">{% widthratio goal.current_value goal.target_value 100 %}%</div>
        </div>
    </div>

    <form hx-post="{% url 'student_update_goal_progress' goal.id %}" hx-target="#goal-configuration-surface" class="space-y-6">
        {% csrf_token %}
        <div class="space-y-4">
            <label class="text-[9px] font-black text-white/30 uppercase tracking-widest">Update Institutional Progress</label>
            <div class="relative">
                <input type="number" name="increment" placeholder="Enter progress increment..." class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-sm text-white focus:border-emerald-500 outline-none transition-all" required>
                <div class="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-white/20 uppercase">Units</div>
            </div>
        </div>

        <button class="w-full py-4 bg-white/5 border border-white/10 text-white text-[10px] font-black rounded-2xl uppercase tracking-[0.2em] hover:bg-emerald-500 hover:border-emerald-500 hover:shadow-lg hover:shadow-emerald-500/20 transition-all">
            Post Progression Update
        </button>
    </form>
</div>
