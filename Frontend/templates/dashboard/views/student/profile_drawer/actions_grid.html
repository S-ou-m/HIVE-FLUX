<!-- 🚀 Operational Quick Actions -->
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-[10px] font-black tracking-[0.2em] text-white/40 uppercase">Recommended Operations</h3>
        <span class="px-2 py-0.5 rounded bg-[#FF6B00]/5 text-[#FF6B00] text-[8px] font-black tracking-widest border border-[#FF6B00]/10 uppercase">
            {{ state.operational_state }} MODE
        </span>
    </div>
    
    <div class="grid grid-cols-2 gap-3">
        <!-- Academic Access -->
        <button class="p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/20 transition-all text-left group">
            <div class="w-8 h-8 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400 group-hover:scale-110 transition-transform mb-3">
                <i class="fas fa-graduation-cap text-xs"></i>
            </div>
            <p class="text-xs font-bold text-white/80">View Academic Recovery</p>
            <p class="text-[8px] text-white/30 uppercase mt-1">Institutional Rail</p>
        </button>

        <!-- Career Surface -->
        <button class="p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/20 transition-all text-left group">
            <div class="w-8 h-8 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400 group-hover:scale-110 transition-transform mb-3">
                <i class="fas fa-rocket text-xs"></i>
            </div>
            <p class="text-xs font-bold text-white/80">Open Career Hub</p>
            <p class="text-[8px] text-white/30 uppercase mt-1">Growth OS</p>
        </button>

        <!-- Security Center -->
        <button class="p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/20 transition-all text-left group">
            <div class="w-8 h-8 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 group-hover:scale-110 transition-transform mb-3">
                <i class="fas fa-shield-alt text-xs"></i>
            </div>
            <p class="text-xs font-bold text-white/80">Security & Privacy</p>
            <p class="text-[8px] text-white/30 uppercase mt-1">Identity OS</p>
        </button>

        <!-- Finance Ledger -->
        <button class="p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/20 transition-all text-left group">
            <div class="w-8 h-8 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-400 group-hover:scale-110 transition-transform mb-3">
                <i class="fas fa-wallet text-xs"></i>
            </div>
            <p class="text-xs font-bold text-white/80">Financial Ledger</p>
            <p class="text-[8px] text-white/30 uppercase mt-1">Institutional Ledger</p>
        </button>
    </div>
</div>
