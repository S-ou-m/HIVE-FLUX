<div class="space-y-6">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-xs font-black uppercase tracking-widest text-white/40">Personal Governance</h3>
        <span class="px-2 py-1 bg-green-500/10 border border-green-500/20 text-[10px] text-green-400 font-black rounded uppercase">Synced</span>
    </div>

    <!-- 🛠️ Governance Grid -->
    <div class="grid grid-cols-1 gap-3">
        <!-- Notification Governance -->
        <div class="p-4 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-between group hover:border-[#FF6B00]/30 transition-all">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-brand-soft flex items-center justify-center text-brand">
                    <i class="fa-solid fa-bell-on text-sm"></i>
                </div>
                <div>
                    <div class="text-sm font-bold text-white">Notification Engine</div>
                    <div class="text-[10px] text-white/40">Institutional alerts & updates</div>
                </div>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" 
                       name="quiet_hours"
                       hx-post="{% url 'student_update_preferences' %}"
                       hx-target="#governance-root"
                       hx-trigger="change"
                       value="true"
                       class="sr-only peer" 
                       {% if state.preferences.quiet_hours %}checked{% endif %}>
                <div class="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand"></div>
            </label>
        </div>

        <!-- Privacy Governance -->
        <div class="p-4 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-between group hover:border-[#FF6B00]/30 transition-all">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400">
                    <i class="fa-solid fa-eye-slash text-sm"></i>
                </div>
                <div>
                    <div class="text-sm font-bold text-white">Profile Visibility</div>
                    <div class="text-[10px] text-white/40">Control who sees your identity</div>
                </div>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" 
                       name="focus_mode"
                       hx-post="{% url 'student_update_preferences' %}"
                       hx-target="#governance-root"
                       hx-trigger="change"
                       value="true"
                       class="sr-only peer" 
                       {% if state.preferences.focus_mode %}checked{% endif %}>
                <div class="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#FF6B00]"></div>
            </label>
        </div>

        <!-- Preference Quick Action -->
        <button hx-get="{% url 'student_identity_command_center_partial_route' %}?tab=settings"
                hx-target="#command-surface-viewport"
                hx-swap="innerHTML"
                class="w-full p-4 bg-white/5 border border-dashed border-white/10 rounded-2xl flex items-center justify-center gap-3 text-xs font-bold text-white/60 hover:bg-white/10 hover:text-white transition-all">
            <i class="fa-solid fa-gear"></i>
            Manage Advanced Preferences
        </button>
    </div>
</div>
