<div class="animate-fade-in finance-module-container dashboard-container">
    
    <!-- 1. SaaS Header Row (Title + Primary Actions) -->
    <div class="finance-header-row">
        <div class="title-group">
            <h2 style="font-size: 1.75rem; font-weight: 700; color: var(--text-primary); margin: 0;">Finance Management</h2>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem;">Monitor institutional revenue, manage student fees, and process faculty payroll.</p>
        </div>
        <div class="action-group" id="finance-actions">
            <button class="btn btn-secondary" 
                    hx-get="{% url 'admin_payment_global_modal' %}"
                    hx-target="#modal-container">
                <span style="margin-right: 0.5rem;">💰</span> Record Payment
            </button>
            <button class="btn btn-primary" 
                    hx-get="{% url 'admin_invoice_batch_modal' %}"
                    hx-target="#modal-container">
                <span style="margin-right: 0.5rem;">🧾</span> Batch Generate Invoices
            </button>
        </div>
    </div>

    <!-- 2. Time Filters & Live Analytics Container -->
    <div class="analytics-header">
        <div class="header-title">
            <h3 style="font-size: 1.1rem; font-weight: 600; margin: 0; color: var(--text-primary);">Financial Health</h3>
            <span class="context-label" id="time-context-label">Showing: Today</span>
        </div>
        
        <div class="segmented-control time-filters">
            <button class="segment-btn active" hx-get="{% url 'admin_finance_stats_partial' %}?time_filter=today" hx-target="#finance-stats-container" hx-push-url="true" onclick="updateTimeFilter(this, 'Today')">Today</button>
            <button class="segment-btn" hx-get="{% url 'admin_finance_stats_partial' %}?time_filter=this_month" hx-target="#finance-stats-container" hx-push-url="true" onclick="updateTimeFilter(this, 'This Month')">This Month</button>
            <button class="segment-btn" hx-get="{% url 'admin_finance_stats_partial' %}?time_filter=this_year" hx-target="#finance-stats-container" hx-push-url="true" onclick="updateTimeFilter(this, 'This Year')">This Year</button>
            <button class="segment-btn" hx-get="{% url 'admin_finance_stats_partial' %}?time_filter=all_time" hx-target="#finance-stats-container" hx-push-url="true" onclick="updateTimeFilter(this, 'All Time')">All Time</button>
        </div>
    </div>

    <!-- Stat Cards Polling Shell -->
    <div id="finance-stats-container" 
         hx-get="{% url 'admin_finance_stats_partial' %}?time_filter=today" 
         hx-trigger="load, every 15s"
         hx-swap="outerHTML settle:200ms">
        <div style="padding: 2rem; text-align: left; color: var(--text-secondary);">
            <span class="htmx-indicator" style="display: inline-block;">Syncing Analytics Engine...</span>
        </div>
    </div>

    <!-- 3. Core Analytical Charts (SaaS Level) -->
    <div class="core-charts-grid" style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
        <div class="chart-card" style="background: var(--bg-surface); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color);">
            <h4 style="margin: 0 0 1rem 0; font-size: 0.9rem; color: var(--text-secondary); text-align: left;">Revenue Trend (Last 30 Days)</h4>
            <div style="height: 250px; width: 100%;"><canvas id="mainRevenueChart"></canvas></div>
        </div>
        <div class="chart-card" style="background: var(--bg-surface); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color);">
            <h4 style="margin: 0 0 1rem 0; font-size: 0.9rem; color: var(--text-secondary); text-align: left;">Payment Modes</h4>
            <div style="height: 250px; width: 100%; display: flex; justify-content: center;"><canvas id="paymentModeChart"></canvas></div>
        </div>
        <div class="chart-card" style="background: var(--bg-surface); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color);">
            <h4 style="margin: 0 0 1rem 0; font-size: 0.9rem; color: var(--text-secondary); text-align: left;">Top Departments</h4>
            <div style="height: 250px; width: 100%;"><canvas id="deptRevenueChart"></canvas></div>
        </div>
    </div>

    <!-- 3. Payroll Insights Area (Populated via OOB when in Payroll tab) -->
    <div id="payroll-stats-container"></div>

    <!-- 4. Navigation Tabs -->
    <div class="finance-tabs-strip">
        <button class="tab-btn active" 
                hx-get="{% url 'admin_fee_setup_partial' %}" 
                hx-target="#finance-content"
                hx-swap="innerHTML"
                onclick="document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">
            Fee Setup
        </button>
        <button class="tab-btn" 
                hx-get="{% url 'admin_student_payments_partial' %}" 
                hx-target="#finance-content"
                hx-swap="innerHTML"
                onclick="document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">
            Student Payments
        </button>
        <button class="tab-btn" 
                hx-get="{% url 'admin_payroll_partial' %}" 
                hx-target="#finance-content"
                hx-swap="innerHTML"
                onclick="document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">
            Payroll
        </button>
    </div>

    <!-- 4. Dynamic Content Area -->
    <div id="finance-content" 
         hx-get="{% url 'admin_fee_setup_partial' %}" 
         hx-trigger="load">
        <div style="padding: 4rem; text-align: left; opacity: 0.5;">Initializing intelligence engine...</div>
    </div>
</div>

<script>
    function updateTimeFilter(btn, labelText) {
        document.querySelectorAll('.segmented-control .segment-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('time-context-label').innerText = 'Showing: ' + labelText;
    }
</script>

<style>
    /* SaaS Master Foundation */
    .finance-module-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 1.5rem;
        text-align: left !important;
    }

    /* Analytics Header & Segmented Controller */
    .analytics-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 16px;
    }

    .analytics-header .header-title {
        display: flex;
        align-items: baseline;
        gap: 12px;
    }

    .context-label {
        font-size: 0.8rem;
        color: var(--text-secondary);
        font-weight: 500;
        letter-spacing: 0.02em;
    }

    .segmented-control {
        display: flex;
        background: rgba(0, 0, 0, 0.2); /* Muted dark pill background */
        padding: 4px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .segment-btn {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 0.8rem;
        font-weight: 600;
        padding: 6px 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .segment-btn:hover {
        color: var(--text-primary);
    }

    .segment-btn.active {
        background: var(--bg-surface);
        color: var(--text-primary);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.05);
    }

    /* Action Headers */
    .finance-header-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 24px;
        padding-top: 16px;
        gap: 24px;
        flex-wrap: wrap;
    }

    .finance-header-row .title-group {
        flex: 1;
        min-width: 300px;
    }

    .finance-header-row .action-group {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    /* Tabs */
    .finance-tabs-strip {
        display: flex;
        gap: 24px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 24px;
    }

    .tab-btn {
        padding: 12px 8px;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        font-weight: 600;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .tab-btn.active {
        color: var(--primary-color) !important;
        border-bottom-color: var(--primary-color) !important;
    }

    .tab-btn:hover:not(.active) {
        color: var(--text-primary);
    }

    @media (max-width: 768px) {
        .finance-header-row { flex-direction: column; }
        .action-group { width: 100%; flex-direction: column; }
        .action-group .btn { width: 100% !important; }
        .core-charts-grid { grid-template-columns: 1fr !important; }
    }
</style>
