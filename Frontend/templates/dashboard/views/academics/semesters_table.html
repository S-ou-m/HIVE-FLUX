<!-- OOB Swap for the Action Button -->
<div id="academics-actions" hx-swap-oob="true">
    <button class="btn btn-primary btn-saas" hx-get="{% url 'admin_semester_create' %}" hx-target="#modal-container">
        <i class="fa-solid fa-plus mr-2"></i> Add Semester
    </button>
</div>

<!-- TOP TOOLBAR -->
<div class="saas-toolbar mb-6">
    <div class="toolbar-left">
        <div class="premium-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search semesters..." 
                   hx-get="{% url 'admin_semesters_partial' %}" 
                   hx-trigger="keyup changed delay:300ms" 
                   hx-target="#academics-content">
        </div>
        <div class="premium-filter">
            <select hx-get="{% url 'admin_semesters_partial' %}" hx-target="#academics-content" name="program_filter">
                <option value="">All Programs</option>
                {% for prog in programs_list %}
                <option value="{{ prog.id }}">{{ prog.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="toolbar-right">
        <button class="icon-action-btn" title="Export CSV"><i class="fa-solid fa-file-export"></i></button>
    </div>
</div>

<!-- DATA TABLE -->
<div class="saas-table-container premium-shadow">
    <table class="saas-data-table">
        <thead>
            <tr>
                <th class="w-1/3">SEMESTER INFO</th>
                <th>LINKED PROGRAM</th>
                <th class="text-center">STATUS</th>
                <th class="text-right pr-6">ACTIONS</th>
            </tr>
        </thead>
        <tbody>
            {% for semester in semesters %}
            <tr class="saas-row">
                <!-- Identity -->
                <td>
                    <div class="dept-identity">
                        <div class="dept-avatar healthy">
                            {{ semester.number }}
                        </div>
                        <div class="dept-info">
                            <span class="dept-name">Semester {{ semester.number }}</span>
                            <div class="dept-meta">
                                <span class="meta-item">Academic Period</span>
                            </div>
                        </div>
                    </div>
                </td>

                <!-- Program Link -->
                <td>
                    <span class="health-pill active" style="padding: 4px 12px; border-radius: 8px; text-transform: none; letter-spacing: normal;">
                        {{ semester.program.name }}
                    </span>
                </td>

                <!-- Status -->
                <td class="text-center">
                    <div class="health-pill-container">
                        <span class="health-pill healthy">
                            <span class="pulse-dot"></span>
                            Active
                        </span>
                    </div>
                </td>

                <!-- Actions -->
                <td class="text-right pr-6">
                    <div class="saas-action-group">
                        <button class="saas-btn edit" title="Edit Semester" hx-get="{% url 'admin_semester_edit' semester.id %}" hx-target="#modal-container">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button class="saas-btn delete" title="Delete Semester" hx-delete="{% url 'admin_semester_delete' semester.id %}" hx-confirm="Are you sure?">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">
                    <div class="saas-empty-state">
                        <div class="empty-icon">📅</div>
                        <p class="empty-text">No semesters found.</p>
                        <button class="btn btn-primary btn-sm mt-4" hx-get="{% url 'admin_semester_create' %}" hx-target="#modal-container">Add Semester</button>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
