<!-- OOB Swaps for Faculty Insights -->
<div id="f-stat-total" hx-swap-oob="true" class="insight-card" style="background: var(--bg-surface); padding: 1.25rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem;">
    <div class="insight-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 0.75rem; border-radius: var(--radius-sm); font-size: 1.25rem;">👨‍🏫</div>
    <div>
        <p style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Total Faculty</p>
        <h3 class="stat-value" style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary);">{{ total_found }}</h3>
    </div>
</div>

<div id="f-stat-depts" hx-swap-oob="true" class="insight-card" style="background: var(--bg-surface); padding: 1.25rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem;">
    <div class="insight-icon" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6; padding: 0.75rem; border-radius: var(--radius-sm); font-size: 1.25rem;">🏛️</div>
    <div>
        <p style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Active Depts</p>
        <h3 class="stat-value" style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary);">{{ active_depts }}</h3>
    </div>
</div>
