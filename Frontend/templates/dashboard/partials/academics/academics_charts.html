<div class="overview-chart-card glass h-full">
    <div class="card-header-main">
        <div class="title-group">
            <span class="label">Department Enrollment</span>
            <h3>Student Distribution</h3>
        </div>
        <div class="header-actions">
            <span class="live-indicator">
                <span class="dot pulse"></span> Live Distribution
            </span>
        </div>
    </div>
    <div class="chart-main-container">
        <canvas id="deptStrengthChart"></canvas>
    </div>
</div>

<style>
    .overview-chart-card { background: rgba(30, 41, 59, 0.4); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); padding: 24px; height: 320px; display: flex; flex-direction: column; }
    
    .card-header-main { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .card-header-main .label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-header-main h3 { font-size: 18px; font-weight: 700; color: #f1f5f9; margin: 4px 0 0 0; }
    
    .live-indicator { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #10b981; font-weight: 700; background: rgba(16, 185, 129, 0.05); padding: 4px 10px; border-radius: 6px; }
    .dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; }
    .dot.pulse { animation: pulse-green 2s infinite; }
    @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

    .chart-main-container { flex: 1; position: relative; width: 100%; min-height: 200px; }
</style>

<script>
    (function() {
        fetch('{% url "admin_academics_chart_data" %}')
            .then(res => res.json())
            .then(data => {
                new Chart(document.getElementById('deptStrengthChart'), {
                    type: 'bar',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: 'Students',
                            data: data.data,
                            backgroundColor: '#3b82f6',
                            borderRadius: 6,
                            barThickness: 32
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                grid: { color: 'rgba(255,255,255,0.02)', drawBorder: false }, 
                                ticks: { color: '#475569', font: { size: 10, weight: '700' } } 
                            },
                            x: { 
                                grid: { display: false }, 
                                ticks: { color: '#475569', font: { size: 10, weight: '700' } } 
                            }
                        }
                    }
                });
            });
    })();
</script>
