<span id="unread-count-badge" hx-swap-oob="innerHTML" class="ml-auto bg-blue-500/10 text-blue-500 text-[10px] px-2 py-0.5 rounded-full font-bold">
    {{ unread_count }}
</span>

<span id="critical-count-badge" hx-swap-oob="innerHTML" class="ml-auto bg-red-500/10 text-red-500 text-[10px] px-2 py-0.5 rounded-full font-bold">
    {{ critical_count }}
</span>

<span id="total-count-badge" hx-swap-oob="innerHTML" class="ml-auto bg-slate-500/10 text-slate-400 text-[10px] px-2 py-0.5 rounded-full font-bold">
    {{ total_count }}
</span>
