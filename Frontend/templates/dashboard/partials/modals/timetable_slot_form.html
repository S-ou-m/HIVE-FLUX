{% load static %}
<div class="modal-content glass-panel p-10 animate-fade-in" style="max-width: 600px; width: 95%; border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(10, 10, 10, 0.9);">
    <!-- Header -->
    <div class="flex justify-between items-start mb-10">
        <div class="flex gap-6">
            <div class="w-14 h-14 rounded-2xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center text-blue-500 shadow-xl shadow-blue-500/5">
                <i class="fas {% if is_edit %}fa-edit{% else %}fa-plus{% endif %} text-xl"></i>
            </div>
            <div>
                <h2 class="text-2xl font-black text-white tracking-tight leading-tight">{{ action_title }}</h2>
                <p class="text-[9px] font-black text-muted uppercase tracking-[0.2em] mt-2 opacity-70">
                    {% if not is_edit %}Allocating slot for {{ time }} on {{ day }}{% else %}Modifying active session parameters{% endif %}
                </p>
            </div>
        </div>
        <button class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-muted hover:text-white hover:bg-white/10 transition-all group" onclick="closeModal()">
            <i class="fas fa-times group-hover:rotate-90 transition-transform duration-300"></i>
        </button>
    </div>

    <!-- Form Surface -->
    <form class="space-y-8" hx-post="{% url 'admin_timetable_management' %}" hx-target="#dashboard-content" hx-on::after-request="closeModal()">
        {% csrf_token %}
        <input type="hidden" name="day" value="{{ day }}">
        <input type="hidden" name="time" value="{{ time }}">
        <input type="hidden" name="is_edit" value="{% if is_edit %}true{% else %}false{% endif %}">
        
        <div class="space-y-6">
            <!-- Subject Selection -->
            <div class="space-y-3">
                <label class="text-[10px] font-black text-muted uppercase tracking-widest px-1">Select Academic Subject</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-500 group-focus-within:text-blue-400">
                        <i class="fas fa-book-open text-xs"></i>
                    </div>
                    <select name="subject" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-6 text-xs font-bold text-white focus:outline-none focus:border-blue-500/50 focus:bg-white/10 transition-all appearance-none cursor-pointer">
                        <option value="" disabled {% if not is_edit %}selected{% endif %}>Identify Subject...</option>
                        {% for sub in subjects %}
                            <option value="{{ sub.id }}" {% if mock_data.subject == sub.name %}selected{% endif %}>{{ sub.name }} ({{ sub.code }})</option>
                        {% endfor %}
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-muted">
                        <i class="fas fa-chevron-down text-[10px]"></i>
                    </div>
                </div>
            </div>

            <!-- Faculty Assignment -->
            <div class="space-y-3">
                <label class="text-[10px] font-black text-muted uppercase tracking-widest px-1">Assign Lead Faculty</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-green-500 group-focus-within:text-green-400">
                        <i class="fas fa-user-tie text-xs"></i>
                    </div>
                    <select name="faculty" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-6 text-xs font-bold text-white focus:outline-none focus:border-blue-500/50 focus:bg-white/10 transition-all appearance-none cursor-pointer">
                        <option value="" disabled {% if not is_edit %}selected{% endif %}>Select Orchestrator...</option>
                        {% for fac in faculties %}
                            <option value="{{ fac.id }}" {% if mock_data.faculty == fac.user.get_full_name %}selected{% endif %}>{{ fac.user.get_full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Room Allocation -->
            <div class="space-y-3">
                <label class="text-[10px] font-black text-muted uppercase tracking-widest px-1">Infrastructure Allocation</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-orange-500 group-focus-within:text-orange-400">
                        <i class="fas fa-building text-xs"></i>
                    </div>
                    <select name="room" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-6 text-xs font-bold text-white focus:outline-none focus:border-blue-500/50 focus:bg-white/10 transition-all appearance-none cursor-pointer">
                        <option value="" disabled {% if not is_edit %}selected{% endif %}>Assign Facility...</option>
                        {% for r in rooms %}
                            <option value="{{ r.id }}" {% if mock_data.room == r.name %}selected{% endif %}>{{ r.name }} [{{ r.building }}]</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <!-- Action Matrix -->
        <div class="flex justify-end gap-4 pt-8 border-t border-white/5">
            <button type="button" class="px-8 py-4 rounded-2xl border border-white/10 text-[11px] font-black text-muted uppercase hover:bg-white/5 hover:text-white transition-all" onclick="closeModal()">
                Cancel
            </button>
            <button type="submit" class="px-12 py-4 rounded-2xl bg-blue-600 text-[11px] font-black text-white uppercase hover:bg-blue-500 shadow-lg shadow-blue-600/20 transition-all flex items-center gap-3">
                <i class="fas fa-check-circle"></i>
                <span>{% if is_edit %}Update Session{% else %}Confirm Allocation{% endif %}</span>
            </button>
        </div>
    </form>
</div>
