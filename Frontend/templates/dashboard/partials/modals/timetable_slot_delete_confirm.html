{% load static %}
<div class="modal-content glass-panel p-10 animate-fade-in text-center" style="max-width: 450px; width: 95%; border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(10, 10, 10, 0.95);">
    <div class="w-20 h-20 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center text-red-500 shadow-xl shadow-red-500/5 mx-auto mb-8">
        <i class="fas fa-trash-alt text-3xl"></i>
    </div>
    
    <h2 class="text-2xl font-black text-white tracking-tight mb-3">Prune Session?</h2>
    <p class="text-xs text-muted leading-relaxed mb-10 px-4">
        You are about to remove this academic session from the orchestration grid. This action will de-allocate the faculty and free up the room resource.
    </p>

    <div class="flex flex-col gap-3">
        <button class="w-full py-4 rounded-2xl bg-red-600 text-[11px] font-black text-white uppercase hover:bg-red-500 shadow-lg shadow-red-600/20 transition-all flex items-center justify-center gap-3"
                hx-post="{% url 'admin_timetable_management' %}" hx-target="#dashboard-partial" hx-on::after-request="closeModal()">
            <i class="fas fa-trash-alt"></i>
            <span>Confirm Deletion</span>
        </button>
        <button class="w-full py-4 rounded-2xl border border-white/10 text-[11px] font-black text-muted uppercase hover:bg-white/5 hover:text-white transition-all" onclick="closeModal()">
            Keep Session
        </button>
    </div>
</div>
