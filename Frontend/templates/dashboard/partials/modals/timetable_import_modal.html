<div class="modal-content glass-panel p-8" style="max-width: 500px; width: 90%; border-radius: 24px;">
    <div class="flex flex-col items-center text-center mb-8">
        <div class="w-14 h-14 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-500 text-2xl mb-4">
            <i class="fas fa-file-import"></i>
        </div>
        <h2 class="text-2xl font-black text-white tracking-tight">Import Blueprint</h2>
        <p class="text-[10px] font-bold text-muted uppercase tracking-widest mt-1">Populate slots from external template</p>
    </div>

    <div class="p-8 border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center gap-4 bg-white/[0.02] hover:bg-white/[0.05] hover:border-blue-500/30 transition-all cursor-pointer group mb-8">
        <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-muted group-hover:text-blue-500 transition-colors">
            <i class="fas fa-cloud-upload-alt text-xl"></i>
        </div>
        <div class="flex flex-col items-center">
            <span class="text-[11px] font-black text-white uppercase">Click to upload file</span>
            <span class="text-[9px] text-muted mt-1 uppercase">CSV, XLSX or JSON format</span>
        </div>
    </div>

    <div class="flex flex-col gap-4 mb-8">
        <div class="flex items-center justify-between px-2">
            <span class="text-[9px] font-black text-muted uppercase tracking-widest">Download Sample</span>
            <i class="fas fa-download text-[9px] text-blue-500 cursor-pointer"></i>
        </div>
    </div>

    <div class="flex justify-center gap-4">
        <button class="btn-pil secondary px-6 py-2.5 text-[11px]" onclick="closeModal()">Cancel</button>
        <button class="btn-pil primary px-8 py-2.5 text-[11px] opacity-50 cursor-not-allowed">
            Start Processing
        </button>
    </div>
</div>
