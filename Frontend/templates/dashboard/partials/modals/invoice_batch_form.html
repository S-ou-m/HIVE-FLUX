<div class="modal-backdrop" onclick="closeModal()">
    <div class="modal-content animate-slide-up" onclick="event.stopPropagation();" style="max-width: 600px; padding: 0;">
        <!-- Header -->
        <div class="modal-header" style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); background: var(--bg-secondary);">
            <div class="header-content">
                <h3 style="display: flex; align-items: center; gap: 0.75rem; color: var(--text-primary);">
                    <span style="font-size: 1.5rem;">🧾</span> Batch Generate Invoices
                </h3>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem;">Generate invoices for multiple students based on selected criteria.</p>
            </div>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>

        <div style="background: rgba(249, 115, 22, 0.1); border-bottom: 1px solid rgba(249, 115, 22, 0.2); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
            <span style="font-size: 1.2rem;">⚠️</span>
            <p style="font-size: 0.8rem; color: var(--primary-color); font-weight: 500;">This action will create invoices in bulk for the selected group.</p>
        </div>

        <form hx-post="{% url 'admin_invoice_batch_generate' %}" hx-target="#modal-container" id="batch-invoice-form">
            {% csrf_token %}
            <div class="modal-body" style="padding: 1.5rem; max-height: 60vh; overflow-y: auto;">
                
                <!-- Section 1: Scope Selection -->
                <div class="form-section" style="margin-bottom: 1.5rem;">
                    <h4 class="section-subtitle">Scope Selection</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Program</label>
                            <select name="program" class="form-control" hx-get="{% url 'admin_invoice_batch_preview' %}" hx-target="#preview-stats-container" hx-trigger="change" name="program">
                                <option value="">All Programs</option>
                                {% for prog in form.fields.program.queryset %}
                                    <option value="{{ prog.id }}">{{ prog.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Semester</label>
                            <select name="semester" class="form-control" hx-get="{% url 'admin_invoice_batch_preview' %}" hx-target="#preview-stats-container" hx-trigger="change" name="semester">
                                <option value="">Select Semester</option>
                                {% for sem in form.fields.semester.queryset %}
                                    <option value="{{ sem.id }}">Semester {{ sem.number }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Fee Mapping -->
                <div class="form-section" style="margin-bottom: 1.5rem;">
                    <h4 class="section-subtitle">Fee Mapping</h4>
                    <div class="form-group">
                        <label>Select Fee Structure to Apply</label>
                        <select name="fee_structure" class="form-control" hx-get="{% url 'admin_invoice_batch_preview' %}" hx-target="#preview-stats-container" hx-trigger="change" required>
                            <option value="">Select an Active Structure</option>
                            {% for fee in form.fields.fee_structure.queryset %}
                                <option value="{{ fee.id }}">{{ fee.program.name }} - Sem {{ fee.semester.number }} (₹{{ fee.amount|floatformat:0 }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Section 3: Settings -->
                <div class="form-section" style="margin-bottom: 1.5rem;">
                    <h4 class="section-subtitle">Invoice Settings</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Due Date</label>
                            {{ form.due_date }}
                        </div>
                        <div class="form-group">
                            <label>Batch Year (Optional)</label>
                            <input type="number" name="admission_year" class="form-control" placeholder="e.g. 2024" hx-get="{% url 'admin_invoice_batch_preview' %}" hx-target="#preview-stats-container" hx-trigger="keyup changed delay:500ms">
                        </div>
                    </div>
                    <div style="margin-top: 1rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.85rem; color: var(--text-secondary);">
                            <input type="checkbox" name="skip_existing" checked style="width: 16px; height: 16px;">
                            Skip students who already have an invoice for this semester
                        </label>
                    </div>
                </div>

                <!-- Live Preview Section -->
                <div id="preview-stats-container" style="background: var(--bg-elevated); border: 1px dashed var(--border-color); border-radius: var(--radius-md); padding: 1.25rem; text-align: center;">
                    <div class="preview-stats" style="color: var(--text-secondary); font-size: 0.9rem;">
                        Select criteria to see generation preview...
                    </div>
                </div>
            </div>

            <!-- Footer Actions -->
            <div class="modal-footer" style="padding: 1.5rem; border-top: 1px solid var(--border-color); background: var(--bg-secondary); display: flex; justify-content: flex-end; gap: 1rem;">
                <button type="button" class="btn btn-secondary" onclick="closeModal()" style="width: auto; background: transparent; border: 1px solid var(--border-color); color: var(--text-primary);">Cancel</button>
                <button type="submit" class="btn btn-primary" id="generate-btn" style="width: auto; min-width: 180px;" 
                        onclick="this.innerHTML='⌛ Processing...'; this.classList.add('loading');">
                    Generate Invoices
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .section-subtitle {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--primary-color);
        font-weight: 700;
        margin-bottom: 1rem;
    }
    .preview-stats strong {
        color: var(--primary-color);
    }
    .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .7; }
    }
    .spinner {
        display: inline-block;
        animation: spin 1s linear infinite;
        margin-right: 0.5rem;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    #generate-btn.loading {
        opacity: 0.7;
        pointer-events: none;
    }
</style>
