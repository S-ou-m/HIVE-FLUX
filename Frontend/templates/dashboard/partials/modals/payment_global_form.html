<div class="modal-backdrop" onclick="closeModal()">
    <div class="modal-content animate-slide-up" onclick="event.stopPropagation();" style="max-width: 650px; padding: 0; min-height: 400px;">
        <!-- Header -->
        <div class="modal-header" style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); background: var(--bg-secondary);">
            <div class="header-content">
                <h3 style="display: flex; align-items: center; gap: 0.75rem; color: var(--text-primary);">
                    <span style="font-size: 1.5rem;">💰</span> Record Payment
                </h3>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem;">Search student and capture transaction details.</p>
            </div>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>

        <div class="modal-body" style="padding: 0; overflow-y: auto; max-height: 75vh;">
            
            <!-- Step 1: Smart Search -->
            <div id="search-section" style="padding: 1.5rem; border-bottom: 1px solid var(--border-color);">
                <div class="form-group" style="position: relative; margin-bottom: 0;">
                    <label style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary-color); font-weight: 700;">Find Student</label>
                    <div style="position: relative; margin-top: 0.5rem;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);">🔍</span>
                        <input type="text" 
                               class="form-control" 
                               placeholder="Search by Name, Enrollment No, or Phone..." 
                               style="padding-left: 2.75rem; background: var(--bg-elevated); border-color: var(--border-color);"
                               hx-get="{% url 'admin_student_search' %}"
                               hx-target="#search-results"
                               hx-trigger="keyup changed delay:300ms"
                               name="q">
                    </div>
                    <!-- Typeahead Results -->
                    <div id="search-results" style="position: absolute; top: 100%; left: 0; right: 0; z-index: 100; background: var(--bg-surface); border: 1px solid var(--border-color); border-top: none; border-radius: 0 0 8px 8px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); display: none;">
                        <!-- Results will be injected here -->
                    </div>
                </div>
            </div>

            <!-- Dynamic Content Area (Step 2 & 3) -->
            <div id="context-container">
                {% if student %}
                    <div hx-get="{% url 'admin_get_student_payment_context' student.id %}" hx-trigger="load" hx-target="#context-container">
                        <div style="padding: 3rem 1.5rem; text-align: center; color: var(--text-secondary);">
                            <div class="animate-pulse">Loading Financial Context for {{ student.user.get_full_name }}...</div>
                        </div>
                    </div>
                    <script>
                        document.getElementById('search-section').style.display = 'none';
                    </script>
                {% else %}
                    <div style="padding: 3rem 1.5rem; text-align: center; color: var(--text-secondary);">
                        <div style="font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3;">📂</div>
                        <p>Enter a name or ID above to start recording a payment.</p>
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="modal-footer" style="padding: 1rem 1.5rem; border-top: 1px solid var(--border-color); background: var(--bg-secondary); display: flex; justify-content: flex-end;">
            <button type="button" class="btn btn-secondary" onclick="closeModal()" style="width: auto; background: transparent; border: 1px solid var(--border-color); color: var(--text-primary);">Cancel</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('htmx:afterOnLoad', (evt) => {
        if (evt.detail.target.id === 'search-results') {
            const results = evt.detail.target;
            if (results.innerHTML.trim() === "") {
                results.style.display = 'none';
            } else {
                results.style.display = 'block';
            }
        }
    });

    // Close results when clicking outside
    document.addEventListener('click', (e) => {
        const results = document.getElementById('search-results');
        if (results && !results.contains(e.target)) {
            results.style.display = 'none';
        }
    });
</script>

<style>
    .search-result-item {
        padding: 0.875rem 1.25rem;
        cursor: pointer;
        border-bottom: 1px solid var(--border-color);
        transition: all 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover {
        background: rgba(249, 115, 22, 0.05);
        padding-left: 1.5rem;
    }
    .search-result-item:hover .res-name { color: var(--primary-color); }
</style>
