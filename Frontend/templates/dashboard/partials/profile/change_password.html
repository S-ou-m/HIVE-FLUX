<div class="saas-panel-wrapper animate-slide-left">
    <div class="panel-header">
        <div class="header-main">
            <i class="fa-solid fa-shield-halved"></i>
            <div>
                <h2>Security Workflow</h2>
                <p>Manage your account authentication and security</p>
            </div>
        </div>
    </div>

    <form class="saas-form" hx-post="{% url 'admin_password_change_partial' %}" hx-swap="none">
        {% csrf_token %}
        
        <div class="security-intelligence">
            <div class="intel-item">
                <i class="fa-solid fa-calendar-check"></i>
                <div>
                    <label>Last changed</label>
                    <span>45 days ago</span>
                </div>
            </div>
            <div class="intel-item warning">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div>
                    <label>Recommendation</label>
                    <span>Update every 60 days for maximum safety</span>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>

            <div class="password-creation-box">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" id="new-password" class="form-control" oninput="checkPasswordStrength(this.value)" required>
                </div>
                
                <!-- Strength Meter UI -->
                <div class="strength-ui">
                    <div class="strength-label">Strength: <span id="strength-text">Empty</span></div>
                    <div class="strength-bars">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                    <ul class="strength-rules">
                        <li id="rule-length"><i class="fa-solid fa-circle"></i> 8+ characters</li>
                        <li id="rule-upper"><i class="fa-solid fa-circle"></i> 1 uppercase letter</li>
                        <li id="rule-symbol"><i class="fa-solid fa-circle"></i> 1 special symbol</li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
        </div>

        <div class="form-section session-toggle">
            <div class="toggle-control">
                <div class="toggle-text">
                    <label>Logout from all other devices</label>
                    <p>Highly recommended if you suspect unauthorized access</p>
                </div>
                <label class="switch">
                    <input type="checkbox" name="logout_all" checked>
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <div class="panel-footer">
            <div class="footer-actions">
                <button type="button" class="btn-ghost" onclick="closeSidePanel()">Cancel</button>
                <button type="submit" class="btn-primary">
                    <span class="btn-text">Update Security</span>
                    <i class="fa-solid fa-circle-notch fa-spin htmx-indicator"></i>
                </button>
            </div>
        </div>
    </form>
</div>

<script>
    function checkPasswordStrength(password) {
        const text = document.getElementById('strength-text');
        const bars = document.querySelectorAll('.strength-bars .bar');
        const ruleLength = document.getElementById('rule-length');
        const ruleUpper = document.getElementById('rule-upper');
        const ruleSymbol = document.getElementById('rule-symbol');

        let strength = 0;
        
        // Rules validation
        const hasLength = password.length >= 8;
        const hasUpper = /[A-Z]/.test(password);
        const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);

        if (hasLength) { strength++; ruleLength.classList.add('valid'); } else { ruleLength.classList.remove('valid'); }
        if (hasUpper) { strength++; ruleUpper.classList.add('valid'); } else { ruleUpper.classList.remove('valid'); }
        if (hasSymbol) { strength++; ruleSymbol.classList.add('valid'); } else { ruleSymbol.classList.remove('valid'); }

        // Update UI
        bars.forEach((bar, index) => {
            bar.className = 'bar';
            if (index < strength) {
                if (strength === 1) bar.classList.add('weak');
                if (strength === 2) bar.classList.add('medium');
                if (strength >= 3) bar.classList.add('strong');
            }
        });

        if (strength === 0) text.innerText = 'Empty';
        if (strength === 1) { text.innerText = 'Weak'; text.style.color = '#ef4444'; }
        if (strength === 2) { text.innerText = 'Medium'; text.style.color = '#eab308'; }
        if (strength >= 3) { text.innerText = 'Strong'; text.style.color = '#22c55e'; }
    }
</script>

<style>
    .security-intelligence {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-bottom: 2.5rem;
    }

    .intel-item {
        display: flex;
        gap: 1rem;
        align-items: center;
        padding: 1.25rem;
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 12px;
    }

    .intel-item.warning { border-color: rgba(234, 179, 8, 0.3); background: rgba(234, 179, 8, 0.05); }

    .intel-item i { font-size: 1.2rem; color: var(--primary-color); }
    .intel-item label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; }
    .intel-item span { font-size: 0.9rem; font-weight: 500; color: var(--text-primary); }

    .password-creation-box {
        margin: 1.5rem 0;
        padding: 1.5rem;
        background: var(--bg-elevated);
        border-radius: 12px;
        border: 1px solid var(--border-color);
    }

    .strength-ui { margin-top: 1rem; }
    .strength-label { font-size: 0.8rem; margin-bottom: 0.5rem; color: var(--text-secondary); }
    .strength-label span { font-weight: 700; }

    .strength-bars { display: flex; gap: 0.4rem; height: 4px; margin-bottom: 1rem; }
    .strength-bars .bar { flex: 1; background: var(--bg-surface); border-radius: 2px; }
    .strength-bars .bar.weak { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    .strength-bars .bar.medium { background: #eab308; box-shadow: 0 0 8px #eab308; }
    .strength-bars .bar.strong { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

    .strength-rules { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.5rem; }
    .strength-rules li { font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem; }
    .strength-rules li i { font-size: 0.4rem; opacity: 0.5; }
    .strength-rules li.valid { color: #22c55e; font-weight: 600; }
    .strength-rules li.valid i { opacity: 1; }

    .session-toggle { padding: 1.5rem !important; }
    .toggle-control { display: flex; justify-content: space-between; align-items: center; }
    .toggle-text label { display: block; font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }
    .toggle-text p { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.2rem; }
</style>
