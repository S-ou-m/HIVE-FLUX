<div class="saas-panel-wrapper animate-slide-left">
    <div class="panel-header">
        <div class="header-main">
            <i class="fa-solid fa-id-card-clip"></i>
            <div>
                <h2>Identity Management</h2>
                <p>Update your personal and professional identity</p>
            </div>
        </div>
        <div class="panel-intelligence">
            <div class="strength-meter">
                <label>Profile Strength</label>
                <div class="meter-bar"><div class="fill" style="width: 92%"></div></div>
                <span>92% Complete</span>
            </div>
        </div>
    </div>

    <form class="saas-form" hx-post="{% url 'admin_profile_edit_partial' %}" hx-swap="none">
        {% csrf_token %}
        
        <!-- Section A: Personal Identity -->
        <div class="form-section">
            <label class="section-label">A. Personal Identity</label>
            
            <div class="avatar-upload">
                <div class="current-avatar">SN</div>
                <div class="upload-controls">
                    <label for="avatar-input" class="btn-outline sm">
                        <i class="fa-solid fa-camera"></i> Change Photo
                    </label>
                    <input type="file" id="avatar-input" hidden>
                    <p class="hint">JPG, PNG or SVG. Max 2MB.</p>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" value="{{ user.get_full_name|default:'Soumya Dutta Nayak' }}" class="form-control">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-with-badge">
                        <input type="email" name="email" value="{{ user.email }}" class="form-control">
                        <span class="status-badge success">Verified</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" placeholder="+91 00000 00000" class="form-control">
                </div>
            </div>
        </div>

        <!-- Section B: Professional Context -->
        <div class="form-section">
            <label class="section-label">B. Professional Context</label>
            <div class="form-grid">
                <div class="form-group">
                    <label>System Role</label>
                    <input type="text" value="System Admin" class="form-control" disabled>
                    <p class="hint"><i class="fa-solid fa-lock"></i> Managed by organization policy</p>
                </div>
                <div class="form-group">
                    <label>Primary Tenant</label>
                    <input type="text" value="{{ college.name }}" class="form-control" disabled>
                </div>
            </div>
        </div>

        <!-- Section C: Profile Intelligence -->
        <div class="form-section intelligence-section">
            <label class="section-label">C. Growth Checklist</label>
            <div class="intelligence-card">
                <div class="check-item warning">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span>Add a phone number for 2FA recovery</span>
                    <button type="button" class="action-btn sm">Add</button>
                </div>
                <div class="check-item success">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>Profile photo is up to date</span>
                </div>
            </div>
        </div>

        <div class="panel-footer">
            <div class="audit-info">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Last updated just now
            </div>
            <div class="footer-actions">
                <button type="button" class="btn-ghost" onclick="closeSidePanel()">Cancel</button>
                <button type="submit" class="btn-primary">
                    <span class="btn-text">Save Changes</span>
                    <i class="fa-solid fa-circle-notch fa-spin htmx-indicator"></i>
                </button>
            </div>
        </div>
    </form>
</div>

<style>
    .saas-panel-wrapper {
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
    }

    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--border-color);
    }

    .header-main {
        display: flex;
        gap: 1.5rem;
        align-items: center;
    }

    .header-main i {
        font-size: 2.5rem;
        color: var(--primary-color);
        background: var(--primary-glow);
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
    }

    .header-main h2 { margin: 0; font-size: 1.5rem; font-weight: 700; }
    .header-main p { margin: 0.2rem 0 0; color: var(--text-secondary); font-size: 0.9rem; }

    .strength-meter {
        text-align: right;
        min-width: 180px;
    }

    .strength-meter label {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: var(--text-secondary);
    }

    .meter-bar {
        height: 6px;
        background: var(--bg-elevated);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 0.4rem;
    }

    .meter-bar .fill {
        height: 100%;
        background: linear-gradient(to right, #f97316, #fb923c);
        box-shadow: 0 0 10px var(--primary-color);
    }

    .strength-meter span {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--primary-color);
    }

    .section-label {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
        font-weight: 700;
        margin-bottom: 1.5rem;
    }

    .form-section {
        background: var(--bg-surface);
        padding: 2rem;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-color);
        margin-bottom: 2rem;
    }

    .avatar-upload {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px dashed var(--border-color);
    }

    .current-avatar {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
        color: white;
        box-shadow: 0 10px 20px var(--primary-glow);
    }

    .hint { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.4rem; }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-primary);
    }

    .input-with-badge {
        position: relative;
    }

    .status-badge {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.65rem;
        font-weight: 700;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
    }

    .status-badge.success { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }

    .intelligence-card {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .check-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        border-radius: 12px;
        font-size: 0.9rem;
    }

    .check-item.warning { background: rgba(234, 179, 8, 0.05); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.1); }
    .check-item.success { background: rgba(34, 197, 94, 0.05); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.1); }

    .check-item .action-btn {
        margin-left: auto;
        background: #eab308;
        color: #000;
        border: none;
        padding: 0.3rem 0.8rem;
        border-radius: 6px;
        font-weight: 700;
        cursor: pointer;
    }

    .panel-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 2rem;
        border-top: 1px solid var(--border-color);
        margin-top: 2rem;
    }

    .audit-info {
        font-size: 0.8rem;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .footer-actions {
        display: flex;
        gap: 1rem;
    }
</style>
