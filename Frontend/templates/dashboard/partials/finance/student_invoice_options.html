<div class="form-group animate-fade-in">
    <label>Pending Invoices</label>
    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
        {% for inv in invoices %}
            <div style="background: var(--bg-elevated); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-weight: 600; color: var(--text-primary);">Semester {{ inv.semester.number }}</div>
                    <div style="font-size: 0.8rem; color: #ef4444;">Due: ₹{{ inv.balance_due|floatformat:2 }}</div>
                </div>
                <button class="btn btn-sm btn-primary" 
                        style="width: auto; padding: 0.4rem 1rem;"
                        hx-get="{% url 'admin_payment_record_modal' inv.id %}"
                        hx-target="#modal-container">
                    Select
                </button>
            </div>
        {% empty %}
            <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; padding: 1rem; background: rgba(34, 197, 94, 0.05); border-radius: 8px;">
                🎉 This student has no pending dues.
            </p>
        {% endfor %}
    </div>
</div>
