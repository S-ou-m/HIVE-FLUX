<div class="animate-fade-in" id="payment-engine-container" 
     data-total-billed="{{ total_billed|default:0 }}" 
     data-total-paid="{{ total_paid|default:0 }}"
     data-invoice-due="{{ invoice.balance_due|default:0 }}">
    
    <h4 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary-color); margin-bottom: 1.5rem;">
        Capture Payment for Semester {{ invoice.semester.number }}
    </h4>

    <form hx-post="{% url 'admin_payment_record_save' invoice.id %}" hx-target="#modal-container" id="payment-record-form">
        {% csrf_token %}
        
        <!-- Amount Entry -->
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary);">
                Amount to Pay
                <div style="display: flex; gap: 0.5rem;">
                    <span class="smart-btn" onclick="setSmartAmount('full')">Pay Full</span>
                    <span class="smart-btn installment" onclick="setSmartAmount('half')">Installment</span>
                </div>
            </label>
            <div style="position: relative; margin-top: 0.5rem;">
                <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);">₹</span>
                <input type="number" name="amount_paid" id="id_amount_paid" class="form-control" 
                       value="{{ invoice.balance_due|default:0 }}" step="0.01"
                       style="padding-left: 2rem; font-size: 1.25rem; font-weight: 700; background: var(--bg-elevated); border-color: var(--primary-color);" 
                       oninput="calculateRemaining()" required>
            </div>
        </div>

        <!-- Payment Mode -->
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="font-size: 0.8rem; color: var(--text-secondary);">Payment Method</label>
            <div style="display: grid; grid-template-columns: 1fr; gap: 0.75rem; margin-top: 0.5rem;">
                <select name="mode" id="id_mode" class="form-control" onchange="toggleModeFields()" style="background: var(--bg-elevated);">
                    <option value="UPI">UPI</option>
                    <option value="CASH">Cash</option>
                    <option value="BANK_TRANSFER">Bank Transfer</option>
                    <option value="CARD">Card</option>
                </select>
                <input type="date" name="payment_date" class="form-control" value="{% now 'Y-m-d' %}" style="background: var(--bg-elevated);">
            </div>
        </div>

        <!-- Dynamic Reference Fields -->
        <div id="dynamic-fields" class="form-group" style="margin-bottom: 1.5rem;">
            <label id="ref-label" style="font-size: 0.8rem; color: var(--text-secondary);">UPI Transaction ID</label>
            <input type="text" name="reference_id" id="id_reference_id" class="form-control" placeholder="Enter Transaction ID" style="background: var(--bg-elevated); margin-top: 0.5rem;">
        </div>

        <!-- Live Calculation -->
        <div class="live-calc" style="background: rgba(34, 197, 94, 0.05); border: 1px solid rgba(34, 197, 94, 0.15); border-radius: 8px; padding: 1rem; margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.5rem;">
                <span style="color: var(--text-secondary);">Balance after payment</span>
                <span id="remaining-due" style="font-weight: 700; color: #22c55e;">₹ 0.00</span>
            </div>
            <div style="height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden;">
                <div id="payment-progress" style="height: 100%; background: #22c55e; width: 0%; transition: width 0.4s ease;"></div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">
            Confirm & Record Payment
        </button>
    </form>
</div>

<script>
    function setSmartAmount(type) {
        const container = document.getElementById('payment-engine-container');
        const due = parseFloat(container.dataset.invoiceDue);
        const input = document.getElementById('id_amount_paid');
        
        if (type === 'full') input.value = due.toFixed(2);
        if (type === 'half') input.value = (due / 2).toFixed(2);
        
        calculateRemaining();
    }

    function calculateRemaining() {
        const container = document.getElementById('payment-engine-container');
        const totalDue = parseFloat(container.dataset.invoiceDue);
        const amountPaid = parseFloat(document.getElementById('id_amount_paid').value) || 0;
        const remaining = totalDue - amountPaid;
        
        // 1. Local UI Updates
        const display = document.getElementById('remaining-due');
        display.innerText = '₹ ' + Math.max(0, remaining).toLocaleString('en-IN', { minimumFractionDigits: 2 });
        
        const progress = document.getElementById('payment-progress');
        const percentage = (amountPaid / totalDue) * 100;
        progress.style.width = Math.min(100, percentage) + '%';
        progress.style.background = percentage >= 100 ? '#22c55e' : '#f59e0b';

        // 2. Broadcast to Parent (Live Summary Sync)
        const parentPaidBase = parseFloat(container.dataset.totalPaid);
        const parentBilledBase = parseFloat(container.dataset.totalBilled);
        
        const newTotalPaid = parentPaidBase + amountPaid;
        const newOutstanding = parentBilledBase - newTotalPaid;

        const paidEl = document.getElementById('paid-to-date-val');
        const outstandingEl = document.getElementById('total-outstanding-val');
        
        if (paidEl) paidEl.innerText = '₹' + newTotalPaid.toLocaleString('en-IN', { minimumFractionDigits: 2 });
        if (outstandingEl) outstandingEl.innerText = '₹' + Math.max(0, newOutstanding).toLocaleString('en-IN', { minimumFractionDigits: 2 });

        // 3. Validation
        const btn = document.querySelector('#payment-record-form button[type="submit"]');
        if (amountPaid > totalDue || amountPaid <= 0) {
            btn.disabled = true;
            btn.style.opacity = '0.5';
        } else {
            btn.disabled = false;
            btn.style.opacity = '1';
        }
    }

    function toggleModeFields() {
        const mode = document.getElementById('id_mode').value;
        const label = document.getElementById('ref-label');
        const input = document.getElementById('id_reference_id');
        
        if (mode === 'CASH') {
            label.innerText = 'Received By / Remarks';
            input.placeholder = 'e.g. Admin Office';
        } else if (mode === 'UPI') {
            label.innerText = 'UPI Transaction ID';
            input.placeholder = 'e.g. 1234567890';
        } else if (mode === 'BANK_TRANSFER') {
            label.innerText = 'Bank Reference Number';
            input.placeholder = 'e.g. UTR Number';
        } else {
            label.innerText = 'Reference ID';
            input.placeholder = 'Enter reference details';
        }
    }

    // Initialize
    calculateRemaining();
    toggleModeFields();
</script>
