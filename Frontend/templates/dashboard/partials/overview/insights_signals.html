<div class="col-span-12 insights-card">
    <div class="card-header">
        <div class="header-main">
            <h3>Decision Intelligence</h3>
            <span class="label-pill">Active Signals</span>
        </div>
    </div>
    
    <div class="insights-grid">
        {% if insights %}
            {% for signal in insights %}
            <div class="insight-tile priority-{{ signal.type }} clickable" onclick="navigateTo('{{ signal.action_url }}')">
                <div class="tile-icon">
                    <i class="fas fa-{{ signal.icon }}"></i>
                </div>
                <div class="tile-content">
                    <div class="tile-header">
                        <span class="tile-label">{{ signal.label }}</span>
                        <span class="priority-tag">{{ signal.type }}</span>
                    </div>
                    <p class="tile-desc">{{ signal.sub_text }}</p>
                </div>
                <div class="tile-action">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-intelligence">
                <i class="fas fa-brain"></i>
                <p>Analyzing institutional patterns... No critical anomalies detected.</p>
            </div>
        {% endif %}
    </div>
</div>

<style>
    .insights-card { background: rgba(30, 41, 59, 0.4); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); padding: 20px; }
    .label-pill { font-size: 10px; font-weight: 800; background: rgba(59, 130, 246, 0.1); color: #3b82f6; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; margin-left: 12px; }

    .insights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 16px; }
    
    .insight-tile { display: flex; align-items: center; gap: 16px; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); transition: all 0.2s; }
    .insight-tile:hover { background: rgba(255,255,255,0.05); transform: translateX(4px); }
    
    .tile-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .priority-critical .tile-icon { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .priority-growth .tile-icon { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    .priority-warning .tile-icon { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    
    .tile-content { flex: 1; }
    .tile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .tile-label { font-size: 14px; font-weight: 700; color: #fff; }
    .priority-tag { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 1px 6px; border-radius: 4px; }
    .priority-critical .priority-tag { background: #ef4444; color: #fff; }
    .priority-growth .priority-tag { background: #10b981; color: #fff; }
    
    .tile-desc { font-size: 12px; color: #64748b; margin: 0; }
    .tile-action { color: #334155; font-size: 12px; }
    
    .empty-intelligence { text-align: center; padding: 40px; color: #475569; }
    .empty-intelligence i { font-size: 32px; margin-bottom: 12px; display: block; opacity: 0.5; }
</style>
